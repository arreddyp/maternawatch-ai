<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts — MaternaWatch AI</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="styles.css">
    <style>
        .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
        .filters select, .filters button { padding:8px 10px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px; border-bottom:1px solid #e5e7eb; text-align:left; }
        th[data-key] { cursor:pointer; user-select:none; }
        .low { color:#16a34a; font-weight:600; }
        .moderate { color:#f59e0b; font-weight:600; }
        .high { color:#dc2626; font-weight:600; }
        .empty { color:#6b7280; padding:14px 0; }
    </style>
</head>
<body>
<div class="topbar">
    <div class="logo">MATERNAWATCH AI</div>
    <div class="top-right">
        <div class="notification">🔔 <span class="badge" id="notif-badge">0</span></div>
        <div class="user-info">Doctor</div>
    </div>
</div>

<div class="app-wrap">
    <nav class="sidebar">
        <h3>MENU</h3>
        <ul>
            <li><a href="doctor.html">Dashboard</a></li>
            <li class="active"><a href="doctor-alerts.html">Alerts</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <div class="card">
            <h3>Filter Alerts</h3>
            <div class="filters">
                <select id="filter-severity">
                    <option value="">All Severity</option>
                    <option value="high">High</option>
                    <option value="moderate">Moderate</option>
                    <option value="low">Low</option>
                </select>

                <select id="filter-status">
                    <option value="">All Status</option>
                    <option value="open">Open</option>
                    <option value="monitoring">Monitoring</option>
                    <option value="closed">Closed</option>
                </select>

                <button id="apply-btn" type="button">Apply</button>
                <button id="clear-btn" type="button">Clear Filters</button>
            </div>
        </div>

        <div class="card" style="margin-top:16px">
            <h3>All Alerts</h3>
            <table>
                <thead>
                    <tr>
                        <th data-key="ts">Date</th>
                        <th data-key="patientName">Patient</th>
                        <th data-key="score">Score</th>
                        <th data-key="level">Level</th>
                        <th data-key="status">Status</th>
                    </tr>
                </thead>
                <tbody id="alerts-table"></tbody>
            </table>
            <div id="empty-msg" class="empty" style="display:none;">No matching alerts.</div>
        </div>
    </main>
</div>

<script>
(() => {
    const STORAGE_KEY = "alerts";

    const fakeAlerts = [
        { id: "a1", ts: "3/7/2026, 9:10 AM",  patientName: "Sarah Johnson",  score: 8, level: "High",     status: "Open" },
        { id: "a2", ts: "3/7/2026, 8:40 AM",  patientName: "Maria Garcia",   score: 5, level: "Moderate", status: "Monitoring" },
        { id: "a3", ts: "3/6/2026, 6:20 PM",  patientName: "Lisa Chen",      score: 7, level: "High",     status: "Open" },
        { id: "a4", ts: "3/6/2026, 3:05 PM",  patientName: "Emma Davis",     score: 2, level: "Low",      status: "Closed" },
        { id: "a5", ts: "3/6/2026, 10:15 AM", patientName: "Priya Patel",    score: 6, level: "High",     status: "Monitoring" },
        { id: "a6", ts: "3/5/2026, 7:45 PM",  patientName: "Jessica Taylor", score: 4, level: "Moderate", status: "Open" }
    ];

    const state = {
        severity: "",
        status: "",
        sortKey: "ts",
        asc: false
    };

    function readAlerts() {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
        catch { return []; }
    }

    function writeAlerts(data) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function seedIfEmpty() {
        const current = readAlerts();
        if (!Array.isArray(current) || current.length === 0) {
            writeAlerts(fakeAlerts);
        }
    }

    function rankLevel(v) {
        const s = String(v || "").toLowerCase();
        return s === "high" ? 3 : s === "moderate" ? 2 : s === "low" ? 1 : 0;
    }

    function rankStatus(v) {
        const s = String(v || "").toLowerCase();
        return s === "open" ? 3 : s === "monitoring" ? 2 : s === "closed" ? 1 : 0;
    }

    function dateVal(v) {
        const t = new Date(v).getTime();
        return Number.isNaN(t) ? 0 : t;
    }

    function getRows() {
        let rows = readAlerts();

        rows = rows.filter(r => {
            const levelOk = !state.severity || String(r.level).toLowerCase() === state.severity;
            const statusOk = !state.status || String(r.status).toLowerCase() === state.status;
            return levelOk && statusOk;
        });

        rows.sort((a, b) => {
            let av, bv;
            switch (state.sortKey) {
                case "ts": av = dateVal(a.ts); bv = dateVal(b.ts); break;
                case "score": av = Number(a.score || 0); bv = Number(b.score || 0); break;
                case "level": av = rankLevel(a.level); bv = rankLevel(b.level); break;
                case "status": av = rankStatus(a.status); bv = rankStatus(b.status); break;
                case "patientName":
                default:
                    av = String(a.patientName || "").toLowerCase();
                    bv = String(b.patientName || "").toLowerCase();
            }
            if (av < bv) return state.asc ? -1 : 1;
            if (av > bv) return state.asc ? 1 : -1;
            return 0;
        });

        return rows;
    }

    function render() {
        const tbody = document.getElementById("alerts-table");
        if (!tbody) return;

        const rows = getRows();

        if (!rows.length) {
            tbody.innerHTML = '<tr class="table-empty"><td colspan="5">No alerts found</td></tr>';
            return;
        }

        tbody.innerHTML = rows.map(r => {
            const levelClass = String(r.level || "").toLowerCase();
            return `
                <tr>
                    <td>${r.ts || "—"}</td>
                    <td>${r.patientName || "—"}</td>
                    <td>${r.score ?? "—"}</td>
                    <td><span class="${levelClass}">${r.level || "—"}</span></td>
                    <td>${r.status || "—"}</td>
                </tr>
            `;
        }).join("");
    }

    function bind() {
        const severity = document.getElementById("filter-severity");
        const status = document.getElementById("filter-status");
        const applyBtn = document.getElementById("apply-btn");
        const clearBtn = document.getElementById("clear-btn");

        if (applyBtn) {
            applyBtn.addEventListener("click", () => {
                state.severity = (severity?.value || "").toLowerCase();
                state.status = (status?.value || "").toLowerCase();
                render();
            });
        }

        if (clearBtn) {
            clearBtn.addEventListener("click", () => {
                if (severity) severity.value = "";
                if (status) status.value = "";
                state.severity = "";
                state.status = "";
                render();
            });
        }

        document.querySelectorAll("th[data-key]").forEach(th => {
            th.addEventListener("click", () => {
                const key = th.getAttribute("data-key");
                if (!key) return;
                if (state.sortKey === key) state.asc = !state.asc;
                else { state.sortKey = key; state.asc = true; }
                render();
            });
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        seedIfEmpty();
        bind();
        render();
    });
})();
</script>
</body>
</html>
